name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Node ${{ matrix.node }} · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        # Node.js 20 was deprecated on GitHub-hosted runners on 2025-09-19.
        # The plugin requires Node >= 20 (engines.node) and tests cleanly on
        # both 22 (LTS) and 24 (current).
        node: ["22", "24"]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Read pnpm version from package.json#packageManager. Passing
      # `version:` here would conflict with that field and abort the job.
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm run build
